<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Flavor Terrorists</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F4EFE6;
  --warm-white: #FDFAF5;
  --charcoal: #1A1A1A;
  --dark-brown: #231510;
  --rust: #C13B18;
  --gold: #C9962A;
  --gold-light: #E8B84B;
  --border: #E0D8CC;
  --card-shadow: 0 4px 20px rgba(0,0,0,0.10);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { font-family:var(--font-body); background:var(--cream); color:var(--charcoal); overscroll-behavior:none; }
.screen { position:absolute; inset:0; display:flex; flex-direction:column; overflow:hidden; }
.screen.hidden { display:none; }
#home { background:var(--cream); }
.home-header {
  background:var(--dark-brown); padding:14px 20px 12px;
  flex-shrink:0; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.home-header::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:200px; height:200px; border-radius:50%;
  background:radial-gradient(circle, rgba(193,59,24,0.35) 0%, transparent 65%);
}
.home-header::after { display:none; }
.eyebrow { display:none; }
.home-title { font-family:var(--font-display); font-size:clamp(20px,4vw,30px); font-weight:900; line-height:1.0; color:#FDFAF5; white-space:nowrap; }
.home-title em { font-style:italic; color:#E86B40; }
.home-meta { font-size:11px; color:rgba(253,250,245,0.45); font-weight:300; display:flex; flex-direction:column; align-items:flex-end; gap:2px; text-align:right; }
.home-meta span { display:none; }
.filter-bar { display:flex; gap:8px; padding:10px 14px 4px; overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-pill { padding:7px 16px; border-radius:50px; border:1.5px solid var(--border); font-size:12px; font-weight:500; color:#7A7060; background:white; white-space:nowrap; cursor:pointer; transition:all 0.18s; flex-shrink:0; }
.filter-pill.active { background:var(--dark-brown); border-color:var(--dark-brown); color:white; }
.recipe-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 14px 40px; }
.recipe-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; }
.recipe-card { background:white; border-radius:18px; overflow:hidden; cursor:pointer; box-shadow:var(--card-shadow); transition:transform 0.18s; -webkit-user-select:none; }
.recipe-card:active { transform:scale(0.965); }
.recipe-card.wide { grid-column:1/-1; display:grid; grid-template-columns:45% 1fr; }
.recipe-card.wide .card-img { aspect-ratio:unset; height:100%; }
.card-img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#E8E0D4; }
.card-body { padding:12px 14px 14px; }
.recipe-card.wide .card-body { padding:18px; display:flex; flex-direction:column; justify-content:center; }
.card-tag { font-size:9px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--rust); margin-bottom:4px; }
.card-title { font-family:var(--font-display); font-size:15px; font-weight:700; line-height:1.25; color:var(--charcoal); margin-bottom:4px; }
.recipe-card.wide .card-title { font-size:20px; }
.card-sub { font-size:11px; color:#8A8070; line-height:1.4; }
.recipe-card.wide .card-sub { font-size:12px; }
.card-pills { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
.card-pill { font-size:10px; font-weight:500; color:#9A9080; }
#detail { background:var(--warm-white); }
.detail-hero { position:relative; height:300px; flex-shrink:0; overflow:hidden; }
.detail-hero img { width:100%; height:100%; object-fit:cover; display:block; }
.detail-hero-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(22,10,5,0.88) 0%, rgba(22,10,5,0.12) 55%, transparent 100%); }
.back-btn { position:absolute; top:52px; left:18px; background:rgba(22,10,5,0.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:none; border-radius:50px; color:white; font-family:var(--font-body); font-size:13px; font-weight:500; padding:9px 16px 9px 12px; cursor:pointer; display:flex; align-items:center; gap:5px; }
.detail-hero-text { position:absolute; bottom:22px; left:22px; right:22px; }
.detail-src { font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--gold-light); margin-bottom:7px; }
.detail-title { font-family:var(--font-display); font-size:26px; font-weight:900; color:white; line-height:1.1; }
.detail-sub { font-size:13px; color:rgba(255,255,255,0.65); margin-top:4px; font-weight:300; }
.detail-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.meta-strip { display:flex; background:white; border-bottom:1px solid var(--border); }
.meta-cell { flex:1; padding:13px 8px; text-align:center; border-right:1px solid var(--border); }
.meta-cell:last-child { border-right:none; }
.meta-val { display:block; font-family:var(--font-display); font-size:16px; font-weight:700; color:var(--charcoal); }
.meta-lbl { display:block; font-size:9px; letter-spacing:1.2px; text-transform:uppercase; color:#A0998A; margin-top:2px; }
.detail-tabs { display:flex; background:white; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
.tab-btn { flex:1; padding:14px 8px; border:none; background:none; font-family:var(--font-body); font-size:13px; font-weight:500; color:#9A9080; cursor:pointer; border-bottom:2.5px solid transparent; transition:all 0.2s; }
.tab-btn.active { color:var(--rust); border-bottom-color:var(--rust); }
.tab-panel { display:none; padding:20px 20px 24px; }
.tab-panel.active { display:block; }
.ing-group-label { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#B0A898; padding:12px 0 6px; border-bottom:1px solid var(--border); margin-bottom:2px; }
.ing-group-label:first-child { padding-top:0; }
.ing-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #F0EAE0; }
.ing-row:last-child { border-bottom:none; }
.ing-dot { width:7px; height:7px; border-radius:50%; background:var(--rust); flex-shrink:0; }
.ing-amt { font-size:13px; font-weight:600; color:var(--rust); min-width:72px; flex-shrink:0; }
.ing-name { font-size:14px; color:var(--charcoal); }
.step-row { display:flex; gap:14px; padding-bottom:20px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.step-row:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
.step-num { width:34px; height:34px; border-radius:50%; background:var(--dark-brown); color:white; font-family:var(--font-display); font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
.step-label { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--rust); margin-bottom:5px; }
.step-text { font-size:14px; line-height:1.7; color:#504840; }
.step-img { width:100%; max-height:160px; object-fit:cover; border-radius:12px; margin-top:10px; display:block; }
.no-steps { border:1.5px dashed #D4C8BC; border-radius:14px; padding:28px 20px; text-align:center; color:#A09880; font-size:14px; line-height:1.7; background:rgba(212,200,188,0.12); }
.cook-cta { position:sticky; bottom:0; padding:14px 20px calc(14px + env(safe-area-inset-bottom)); background:white; border-top:1px solid var(--border); }
.cook-cta button { width:100%; padding:17px; background:var(--dark-brown); color:white; border:none; border-radius:14px; font-family:var(--font-body); font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background 0.2s; }
.cook-cta button:active { background:var(--rust); }
#cooking { background:var(--dark-brown); color:white; }
.cook-top { padding:52px 24px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.cook-exit { background:rgba(255,255,255,0.1); border:none; border-radius:50px; color:rgba(255,255,255,0.75); font-family:var(--font-body); font-size:13px; font-weight:500; padding:9px 16px; cursor:pointer; }
.cook-step-counter { font-size:13px; color:rgba(255,255,255,0.45); letter-spacing:1px; }
.cook-prog-bar { height:2px; background:rgba(255,255,255,0.1); margin:0 24px; border-radius:2px; overflow:hidden; flex-shrink:0; }
.cook-prog-fill { height:100%; background:var(--gold-light); border-radius:2px; transition:width 0.4s ease; }
.cook-content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:20px 24px 0; }
.cook-big-num { font-family:var(--font-display); font-size:90px; font-weight:900; color:rgba(255,255,255,0.06); line-height:1; margin-bottom:-18px; user-select:none; }
.cook-label { font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:14px; }
.cook-text { font-family:var(--font-display); font-size:clamp(20px,4vw,28px); font-weight:400; line-height:1.6; color:rgba(255,255,255,0.9); }
.cook-step-img { width:100%; border-radius:18px; margin-top:22px; max-height:230px; object-fit:cover; display:block; }
.cook-nav { display:flex; gap:10px; padding:16px 24px calc(16px + env(safe-area-inset-bottom)); flex-shrink:0; }
.cook-prev, .cook-next { border:none; border-radius:14px; font-family:var(--font-body); font-size:15px; font-weight:600; cursor:pointer; padding:18px; transition:opacity 0.15s, transform 0.15s; }
.cook-prev { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.7); flex:1; }
.cook-next { background:var(--rust); color:white; flex:2; }
.cook-prev:active, .cook-next:active { opacity:0.7; transform:scale(0.97); }
.cook-prev:disabled { opacity:0.25; cursor:default; }
.cook-done { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 28px; text-align:center; }
.done-emoji { font-size:68px; margin-bottom:20px; }
.done-h { font-family:var(--font-display); font-size:38px; font-weight:900; color:white; margin-bottom:10px; }
.done-p { font-size:15px; color:rgba(255,255,255,0.5); line-height:1.6; margin-bottom:36px; }
.done-back { background:var(--rust); border:none; border-radius:14px; color:white; font-family:var(--font-body); font-size:15px; font-weight:600; padding:17px 36px; cursor:pointer; }

/* ── IMAGE FALLBACKS ── */
.card-img[data-fallback="true"], .detail-hero img[data-fallback="true"] { display:none; }
.img-placeholder { width:100%; aspect-ratio:4/3; display:flex; align-items:center; justify-content:center; font-size:36px; flex-shrink:0; }
.recipe-card.wide .img-placeholder { aspect-ratio:unset; height:100%; }
.cat-Beef .img-placeholder      { background:linear-gradient(135deg,#3D1A0E,#6B2D1A); }
.cat-Chicken .img-placeholder   { background:linear-gradient(135deg,#1A2E0E,#3B5C1A); }
.cat-Pork .img-placeholder      { background:linear-gradient(135deg,#2E1A2E,#5C3A5C); }
.cat-Seafood .img-placeholder   { background:linear-gradient(135deg,#0E1A2E,#1A3B5C); }
.cat-Turkey .img-placeholder    { background:linear-gradient(135deg,#2E2210,#6B521A); }
.cat-Vegetarian .img-placeholder{ background:linear-gradient(135deg,#0E2E1A,#1A5C3B); }
.cat-Pasta .img-placeholder     { background:linear-gradient(135deg,#2E1A0E,#8B5E3C); }
.cat-Sides .img-placeholder     { background:linear-gradient(135deg,#1A1A2E,#3A3A6B); }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen">
  <div class="home-header">
    <div class="eyebrow">A Personal Cookbook</div>
    <h1 class="home-title">The Flavor<br><em>Terrorists</em></h1>
    <div class="home-meta"><span id="recipe-count-label">13 recipes</span><span></span>Geoff &amp; Emily</div>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="recipe-scroll"><div class="recipe-grid" id="recipe-grid"></div></div>
</div>

<!-- DETAIL -->
<div id="detail" class="screen hidden">
  <div class="detail-hero">
    <img id="d-img" src="" alt="" onerror="this.style.display='none'">
    <div class="detail-hero-overlay"></div>
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="detail-hero-text">
      <div class="detail-src" id="d-src"></div>
      <div class="detail-title" id="d-title"></div>
      <div class="detail-sub" id="d-sub"></div>
    </div>
  </div>
  <div class="detail-body">
    <div class="meta-strip" id="d-meta"></div>
    <div class="detail-tabs">
      <button class="tab-btn active" onclick="switchTab('ingredients',this)">Ingredients</button>
      <button class="tab-btn" onclick="switchTab('steps',this)">Method</button>
    </div>
    <div id="tab-ingredients" class="tab-panel active"></div>
    <div id="tab-steps" class="tab-panel"></div>
  </div>
  <div class="cook-cta"><button onclick="startCooking()">🍳 &nbsp;Start Cooking Mode</button></div>
</div>

<!-- COOKING -->
<div id="cooking" class="screen hidden">
  <div class="cook-top">
    <button class="cook-exit" onclick="exitCooking()">✕ Exit</button>
    <span class="cook-step-counter" id="ck-counter"></span>
  </div>
  <div class="cook-prog-bar"><div class="cook-prog-fill" id="ck-fill"></div></div>
  <div class="cook-content" id="ck-content"></div>
  <div class="cook-nav">
    <button class="cook-prev" id="ck-prev" onclick="cookNav(-1)">← Prev</button>
    <button class="cook-next" id="ck-next" onclick="cookNav(1)">Next →</button>
  </div>
</div>

<script>
const RECIPES = [
  // ── ORIGINAL 13 ──────────────────────────────────────────────────────────
  {id:'fajitas',tag:'Original',category:'Beef',title:'Fajitas with Grilled Pineapple & Peppers',sub:'Marinated flank steak, charred peppers & caramelized pineapple',image:'https://images.unsplash.com/photo-1599974579688-8dbdd335c77f?w=800&q=80',time:'45 min + 2–6 hr marinade',difficulty:'Medium',servings:'4–5',calories:'—',
    ingredientGroups:[
      {label:'Marinade',items:[{amt:'¼ cup',name:'Worcestershire Sauce'},{amt:'3 cloves',name:'Garlic, minced'},{amt:'¼ cup',name:'Soy Sauce'},{amt:'2 tbsp',name:'Red Wine Vinegar'},{amt:'1 tbsp',name:'Dijon Mustard'}]},
      {label:'Fajitas',items:[{amt:'1½–2 lbs',name:'Flank Steak'},{amt:'1',name:'Green Bell Pepper, sliced'},{amt:'1',name:'Red Bell Pepper, sliced'},{amt:'1',name:'Yellow Bell Pepper, sliced'},{amt:'1 large',name:'Red Onion, sliced'},{amt:'1 cup',name:'Fresh Pineapple, sliced into strips'},{amt:'8–10',name:'Flour Tortillas'}]}
    ],
    steps:[
      {title:'Marinate the Steak',text:'In a bowl, whisk together Worcestershire sauce, minced garlic, soy sauce, red wine vinegar, and Dijon mustard. Place the flank steak in a shallow dish or zip-top bag and pour the marinade over it. Refrigerate for at least 2 hours, preferably 4–6 hours.',img:null},
      {title:'Cook the Steak',text:'Heat a cast iron skillet over medium-high heat until very hot. Remove the steak from the marinade and pat dry. Cook for 4–6 minutes per side depending on thickness, until desired doneness. Let rest for 5–10 minutes before slicing thinly against the grain.',img:null},
      {title:'Sauté the Vegetables',text:'In a large skillet over medium-high heat, cook the sliced peppers and red onion until tender and slightly charred, about 6–8 minutes. Add the pineapple during the last 2–3 minutes to warm and lightly caramelize.',img:null},
      {title:'Warm the Tortillas',text:'Heat tortillas directly over a gas flame or in a dry skillet until warm and lightly toasted. Keep wrapped in a clean towel to stay warm.',img:null},
      {title:'Assemble the Fajitas',text:'Layer sliced steak, sautéed vegetables, and pineapple onto warm tortillas. Serve immediately.',img:null},
    ]},
  {id:'tenderloin-orig',tag:'Original',category:'Beef',title:'Slow-Roasted Beef Tenderloin',sub:'Horseradish crust — simply perfect',image:'https://images.unsplash.com/photo-1544025162-d76538f10f30?w=800&q=80',time:'1 hr 15 min',difficulty:'Easy',servings:'6',calories:'—',
    ingredientGroups:[
      {label:'Main',items:[{amt:'3–4 lbs',name:'Beef Tenderloin'},{amt:'generous',name:'Prepared Horseradish'},{amt:'to taste',name:'Salt & Pepper'}]}
    ],
    steps:[
      {title:'Preheat',text:'Preheat oven to 450°F. Let the tenderloin rest at room temperature for 30 minutes before cooking.',img:null},
      {title:'Prep the Roast',text:'Place the beef in a foil-lined roasting pan. Cover the entire top with a generous, thick layer of prepared horseradish — pat it firmly so it adheres well.',img:null},
      {title:'Roast',text:'Roast for 35–45 minutes for medium rare. Use a thermometer: 145°F for rare, 150°F for medium. Don\'t open the oven during cooking.',img:null},
      {title:'Rest',text:'Remove from oven and tent loosely with foil. Let rest 15–45 minutes. The juices redistribute and the internal temp climbs slightly.',img:null},
      {title:'Slice & Serve',text:'Slice into medallions against the grain. Serve with horseradish cream or pan drippings.',img:null},
    ]},
  {id:'cherry-pork',tag:'HelloFresh',category:'Pork',title:'Cherry-Drizzled Pork Chops',sub:'with Couscous Salad',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/cherry-drizzled-pork-chops-f4d9eb94.jpg',time:'35 min',difficulty:'Easy',servings:'2',calories:'560 kcal',
    ingredientGroups:[
      {label:'Produce',items:[{amt:'4 oz',name:'Grape Tomatoes'},{amt:'2',name:'Scallions'},{amt:'¼ oz',name:'Parsley'},{amt:'1',name:'Lemon'}]},
      {label:'Proteins & Pantry',items:[{amt:'12 oz',name:'Pork Chops'},{amt:'1 oz',name:'Dried Cherries'},{amt:'½ cup',name:'Couscous'},{amt:'1',name:'Chicken Stock Concentrate'},{amt:'1 oz',name:'Cherry Jam'}]},
      {label:'From Your Pantry',items:[{amt:'1 tsp',name:'Vegetable Oil'},{amt:'to taste',name:'Salt & Pepper'}]}
    ],
    steps:[
      {title:'Prep',text:'Wash and dry all produce. Bring 2 cups water to a boil. Zest and halve the lemon. Halve grape tomatoes. Trim and thinly slice scallions, keeping greens and whites separate. Finely chop parsley.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58f935503bddb5073d34f472-0-0-71b08d15.jpg'},
      {title:'Plump Cherries',text:'Place dried cherries in a small bowl. Pour over just enough boiling water to cover — save 1 cup of boiling water for the couscous. Set aside.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58f935503bddb5073d34f472-1-0-4d0fac98.jpg'},
      {title:'Make Couscous',text:'Put couscous in a medium bowl. Stir in scallion whites and a pinch of salt and pepper. Pour in 1 cup boiling water and cover. Set aside.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58f935503bddb5073d34f472-2-0-8514320f.jpg'},
      {title:'Cook Pork Chops',text:'Heat a drizzle of oil in a large pan over high heat. Pat pork chops dry. Season all over with salt and pepper. Cook 3–6 minutes per side. Remove and rest 5 minutes.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58f935503bddb5073d34f472-3-0-528ee714.jpg'},
      {title:'Make Pan Sauce',text:'Add stock concentrate, cherry jam, and half the cherries with steeping water to the same pan over medium heat. Stir, simmer, and reduce by half until it sticks to a spoon. Season with salt and pepper.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58f935503bddb5073d34f472-4-0-a4435f38.jpg'},
      {title:'Finish & Plate',text:'Fluff couscous. Toss with grape tomatoes, scallion greens, lemon zest, remaining cherries, and lemon juice. Divide between plates, top with pork chops, drizzle with pan sauce, garnish with parsley.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58f935503bddb5073d34f472-5-0-577dc39d.jpg'},
    ]},
  {id:'lemon-salmon',tag:'HelloFresh',category:'Seafood',title:'Creamy Lemon Salmon',sub:'over Tomato Scallion Couscous',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/creamy-lemon-salmon-7cbb571e.jpg',time:'35 min',difficulty:'Easy',servings:'2',calories:'710 kcal',
    ingredientGroups:[
      {label:'Produce',items:[{amt:'1',name:'Roma Tomato'},{amt:'1',name:'Lemon'},{amt:'2',name:'Scallions'},{amt:'2 cloves',name:'Garlic'}]},
      {label:'Proteins & Pantry',items:[{amt:'10 oz',name:'Skin-On Salmon Fillets'},{amt:'4 tbsp',name:'Sour Cream'},{amt:'½ cup',name:'Israeli Couscous'},{amt:'1 tbsp',name:'Fry Seasoning'}]},
      {label:'From Your Pantry',items:[{amt:'2 tbsp',name:'Butter'},{amt:'1 tbsp',name:'Vegetable Oil'},{amt:'to taste',name:'Salt & Pepper'}]}
    ],
    steps:[
      {title:'Prep',text:'Wash and dry all produce. Core and seed tomato, then cut into ½-inch pieces. Zest lemon until you have 1 tsp zest, then cut into wedges. Trim and thinly slice scallions, keeping greens and whites separate. Mince or grate garlic.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a53ad51c28800028e5f9262/step-d3fb27c7.jpg'},
      {title:'Make Crema',text:'In a small bowl, stir together sour cream, half the lemon zest, and a few squeezes of lemon juice — start with about ¼ of the lemon and adjust to taste. Season with salt and pepper.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a53ad51c28800028e5f9262/step-69552e45.jpg'},
      {title:'Cook Couscous',text:'Melt 1 TBSP butter in a medium pot over medium-high heat. Add couscous and cook, stirring occasionally, until lightly toasted, 2–3 minutes. Add 1 cup water and bring to a boil. Lower heat and simmer until al dente, 7–9 minutes. Remove and set aside.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a53ad51c28800028e5f9262/step-83bcfc89.jpg'},
      {title:'Stir Couscous',text:'Heat another 1 TBSP butter and a drizzle of oil in the same pot over medium-high heat. Add scallion whites and tomato; cook 2–3 minutes. Lower heat, add garlic; cook 1 minute until fragrant. Stir in couscous. Season with salt and pepper.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a53ad51c28800028e5f9262/step-1f2312ae.jpg'},
      {title:'Cook Salmon',text:'Heat a drizzle of oil in a nonstick pan over medium-high heat. Pat salmon dry. Season all over with salt, pepper, and fry seasoning. Add skin-side down. Cook until skin is crisp, 4–6 minutes. Flip and cook to desired doneness, 2–3 minutes more.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a53ad51c28800028e5f9262/step-6c297977.jpg'},
      {title:'Plate & Serve',text:'Fluff couscous with a fork, then stir in half the scallion greens. Divide between plates along with salmon, skin-side up to keep it crisp. Drizzle salmon with a spoonful of crema. Sprinkle with remaining scallion greens. Serve with lemon wedges on the side.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a53ad51c28800028e5f9262/step-56ae093c.jpg'},
    ]},
  {id:'honey-mustard-chicken',tag:'HelloFresh',category:'Chicken',title:'Honey Mustard Chicken',sub:'with Roasted Sweet Potatoes, Zucchini & Onion',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/honey-mustard-chicken-0bf709a5.jpg',time:'40 min',difficulty:'Easy',servings:'2',calories:'530 kcal',
    ingredientGroups:[
      {label:'Produce',items:[{amt:'1',name:'Red Onion'},{amt:'1',name:'Zucchini'},{amt:'2',name:'Sweet Potatoes'},{amt:'1 clove',name:'Garlic'},{amt:'¼ oz',name:'Parsley'}]},
      {label:'Proteins & Sauce',items:[{amt:'12 oz',name:'Chicken Breasts'},{amt:'½ oz',name:'Honey'},{amt:'1 tbsp',name:'Whole Grain Mustard'},{amt:'1 tsp',name:'White Wine Vinegar'}]},
      {label:'From Your Pantry',items:[{amt:'2 tbsp',name:'Olive Oil'},{amt:'to taste',name:'Salt & Pepper'}]}
    ],
    steps:[
      {title:'Preheat & Prep',text:'Wash and dry all produce. Preheat oven to 400°F. Halve, peel, and cut onion into ½-inch wedges. Halve zucchini lengthwise, then cut into ½-inch half-moons. Cut sweet potatoes into 1-inch cubes.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/5956525ac9fd0852f60e1342-0-0-3ac4ba88.jpg'},
      {title:'Roast Veggies',text:'Place veggies on a baking sheet and toss with 1 TBSP olive oil and a pinch of salt and pepper. Roast in oven until tender and lightly browned, 25–35 minutes.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/5956525ac9fd0852f60e1342-1-0-3f0ba65f.jpg'},
      {title:'Marinate Chicken',text:'Mince or grate garlic. In a medium bowl, whisk together garlic, honey, 1 TBSP mustard, 1 tsp white wine vinegar, and 1 TBSP olive oil. Season with salt and pepper. Add chicken and toss to coat.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/5956525ac9fd0852f60e1342-2-0-e81d31ca.jpg'},
      {title:'Sear Chicken',text:'Heat a medium ovenproof pan over medium-high heat. Remove chicken from marinade, letting excess drip off. Sear until no longer pink on surface, 2–3 minutes per side, brushing with a bit of marinade as it cooks.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/5956525ac9fd0852f60e1342-3-0-f7e29460.jpg'},
      {title:'Bake Chicken',text:'Pour any remaining marinade into pan with chicken. Once veggies have roasted about 15 minutes, place pan with chicken in oven. Roast until chicken is firm and no longer pink in center, 8–10 minutes.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/5956525ac9fd0852f60e1342-4-0-b38f9d3c.jpg'},
      {title:'Plate & Serve',text:'Divide veggies and chicken between plates. Drizzle with any remaining pan marinade. Tear parsley leaves and scatter over top.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/5956525ac9fd0852f60e1342-5-0-35d2063a.jpg'},
    ]},
  {id:'buffalo-chicken',tag:'HelloFresh',category:'Chicken',title:"Rachael Ray's Grilled Buffalo Chicken",sub:'with Carrot Celery Slaw and Mashed Taters',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/rachael-rays-grilled-buffalo-chicken-2e08f497.jpg',time:'30 min',difficulty:'Easy',servings:'2',calories:'590 kcal',
    ingredientGroups:[
      {label:'Produce',items:[{amt:'1',name:'Russet Potato'},{amt:'2',name:'Scallions'},{amt:'1 stalk',name:'Celery'},{amt:'1',name:'Carrot'}]},
      {label:'Proteins & Sauce',items:[{amt:'12 oz',name:'Chicken Breasts'},{amt:'¼ cup',name:"Frank's Red Hot Sauce"},{amt:'4 tbsp',name:'Sour Cream'},{amt:'½ tsp',name:'Celery Salt'},{amt:'1 tbsp',name:'White Wine Vinegar'}]},
      {label:'From Your Pantry',items:[{amt:'1 tbsp',name:'Olive Oil'},{amt:'2 tbsp',name:'Butter'},{amt:'to taste',name:'Salt & Pepper'}]}
    ],
    steps:[
      {title:'Boil Potato',text:'Wash and dry all produce. Preheat grill to high (or skip if cooking on stove). Peel potato and cut into ½-inch cubes. Place in a medium pot with enough water to cover by 1 inch. Bring to a boil with a pinch of salt. Cook until easily pierced, 10–12 minutes. Drain and return to pot.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/590c7e50d56afa54087cb232-0-0-a5280c29.jpg'},
      {title:'Make Slaw',text:'Thinly slice scallions on an angle. Thinly slice celery. Peel and grate carrot. In a bowl, toss celery, carrot, 1 TBSP white wine vinegar, ½ tsp celery salt, a drizzle of olive oil, and a pinch of pepper and sugar.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/590c7e50d56afa54087cb232-1-0-223047cc.jpg'},
      {title:'Cook Chicken',text:'Heat a drizzle of olive oil in a large pan over medium-high heat. Pat chicken dry, rub with a little olive oil, and season with salt and pepper. Cook on stove or grill until no longer pink in center, 4–5 minutes per side. Set aside.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/590c7e50d56afa54087cb232-2-0-1ba140c1.jpg'},
      {title:'Make Buffalo Sauce',text:"Add Frank's RedHot to the same pan over medium heat. Bring to a gentle simmer, then reduce to low. Add butter one piece at a time, whisking to melt and incorporate. Once all butter is mixed in, add chicken and toss to coat. Remove from heat.",img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/590c7e50d56afa54087cb232-3-0-2bd72a5d.jpg'},
      {title:'Mash Potato',text:'Add sour cream to drained potato in pot. Mash until mostly smooth. Stir in half the scallions. Season with salt and pepper. Reheat briefly over medium-low if needed.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/590c7e50d56afa54087cb232-4-0-e96f93c6.jpg'},
      {title:'Plate & Serve',text:'Divide slaw and mashed potato between plates. Add chicken, letting excess sauce drip off before plating. Garnish with remaining scallions and serve.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/590c7e50d56afa54087cb232-5-0-52781c3e.jpg'},
    ]},
  {id:'soy-steak',tag:'HelloFresh',category:'Beef',title:'Soy-Marinated Steak',sub:'with Peanut Sauce and Crispy Broccoli',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/w21-r2-f2cf4a72.jpg',time:'40 min',difficulty:'Easy',servings:'2',calories:'710 kcal',
    ingredientGroups:[
      {label:'Produce & Grains',items:[{amt:'8 oz',name:'Broccoli Florets'},{amt:'½ cup',name:'Jasmine Rice'},{amt:'2',name:'Scallions'},{amt:'2 cloves',name:'Garlic'},{amt:'1',name:'Lime'}]},
      {label:'Proteins & Sauce',items:[{amt:'12 oz',name:'Beef Stir-Fry Strips'},{amt:'4 tbsp',name:'Soy Sauce'},{amt:'2 tbsp',name:'Peanut Butter'}]},
      {label:'From Your Pantry',items:[{amt:'5 tsp',name:'Vegetable Oil'},{amt:'4 tsp',name:'Sugar'},{amt:'to taste',name:'Salt & Pepper'}]}
    ],
    steps:[
      {title:'Preheat & Prep',text:'Wash and dry all produce. Preheat oven to 400°F. Bring ¾ cup water and a pinch of salt to a boil in a small pot. Mince or grate garlic. Zest lime until you have ½ tsp zest, then cut into halves — cut one half into wedges. Thinly slice scallions, keeping greens and whites separate.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58e65ffcd56afa71220915b2-0-0-f02ba21e.jpg'},
      {title:'Roast Broccoli & Cook Rice',text:'Toss broccoli with a drizzle of oil and a pinch of salt and pepper on a baking sheet. Roast until crispy, 15–20 minutes. Once water is boiling, add rice to pot. Cover, lower heat, and simmer until tender, 15–20 minutes.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58e65ffcd56afa71220915b2-1-0-64721355.jpg'},
      {title:'Marinate Beef',text:'In a medium bowl, toss together beef, half the garlic, lime zest, 1 TBSP soy sauce, 2 tsp sugar, and a large drizzle of oil. Season with salt and pepper.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58e65ffcd56afa71220915b2-2-0-58c39443.jpg'},
      {title:'Make Peanut Sauce',text:'Heat a drizzle of oil in a large pan over low heat. Add scallion whites and remaining garlic; cook 1 minute. Stir in peanut butter, 2 tsp sugar, and 1 tsp soy sauce. Slowly pour in ¼ cup water, stirring to combine. Remove from heat and stir in a squeeze of lime. Season with salt and pepper. Transfer to a bowl.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58e65ffcd56afa71220915b2-3-0-6b495201.jpg'},
      {title:'Cook Beef',text:'Rinse and dry the pan. Heat a drizzle of oil over medium-high heat. Add beef and cook, tossing, until browned and cooked to desired doneness, 3–4 minutes. Cook in batches to avoid overcrowding.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58e65ffcd56afa71220915b2-4-0-43cfb1a6.jpg'},
      {title:'Plate & Serve',text:'Divide rice between plates, then top with broccoli and beef. Drizzle with peanut sauce. Garnish with scallion greens. Serve with lime wedges and any remaining peanut sauce on the side.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58e65ffcd56afa71220915b2-5-0-c3c9dd4a.jpg'},
    ]},
  {id:'honey-chicken',tag:'HelloFresh',category:'Chicken',title:"Lauren Conrad's Sweet-As-Honey Chicken",sub:'with Green Beans over Jasmine Rice',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/sweet-as-honey-chicken-43c5ca5e.jpg',time:'30 min',difficulty:'Easy',servings:'2',calories:'560 kcal',
    ingredientGroups:[
      {label:'Produce & Grains',items:[{amt:'2 cloves',name:'Garlic'},{amt:'1',name:'Lime'},{amt:'1 thumb',name:'Ginger'},{amt:'½ cup',name:'Jasmine Rice'},{amt:'6 oz',name:'Green Beans'}]},
      {label:'Proteins & Sauce',items:[{amt:'12 oz',name:'Chicken Breasts'},{amt:'1 tbsp',name:'Soy Sauce'},{amt:'1 oz',name:'Honey'},{amt:'1.5 tbsp',name:'White Wine Vinegar'},{amt:'1',name:'Chicken Stock Concentrate'}]},
      {label:'From Your Pantry',items:[{amt:'1 tbsp',name:'Vegetable Oil'},{amt:'to taste',name:'Salt & Pepper'}]}
    ],
    steps:[
      {title:'Prep',text:'Wash and dry all produce. Bring 1 cup water and a pinch of salt to a boil in a small pot. Mince garlic. Cut lime into wedges. Peel ginger and mince until you have 1 TBSP.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5b6dfcf630006c7bd27889c2/step-adf3b247.jpg'},
      {title:'Cook Rice & Chicken',text:'Once water boils, add rice. Cover, lower heat, and simmer until tender, about 15 minutes. Meanwhile, heat a drizzle of oil in a large pan over medium-high heat. Season chicken with salt and pepper. Cook until no longer pink in center, 4–5 minutes per side. Remove and set aside.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5b6dfcf630006c7bd27889c2/step-bc46f60f.jpg'},
      {title:'Cook Aromatics',text:'Reduce heat to medium-low and add a drizzle of oil. Add minced ginger and garlic. Cook, tossing, until softened and fragrant, about 1 minute. Pour in 1½ TBSP vinegar and let reduce until almost evaporated.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5b6dfcf630006c7bd27889c2/step-13859223.jpg'},
      {title:'Make Glaze',text:'Stir 1 TBSP soy sauce, 2 TBSP water, stock concentrate, and honey into the same pan. Simmer until the mixture thickens to a glaze, 2–3 minutes. Remove from heat, return chicken to pan, and toss to coat.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5b6dfcf630006c7bd27889c2/step-9b73b499.jpg'},
      {title:'Cook Green Beans',text:'Microwave green beans in a covered bowl with a splash of water on high until just tender, about 2 minutes. Drain thoroughly, then cook in a drizzle of oil in a medium pan over medium-high heat until lightly crisped, 3–5 minutes. Season with salt, pepper, and a squeeze of lime.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5b6dfcf630006c7bd27889c2/step-f0e74a4a.jpg'},
      {title:'Plate & Serve',text:'Divide rice between plates. Top with green beans and chicken. Serve with remaining lime wedges on the side for squeezing over.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5b6dfcf630006c7bd27889c2/step-a49e2502.jpg'},
    ]},
  {id:'tenderloin-hf',tag:'HelloFresh',category:'Beef',title:'Beef Tenderloin with Tangy Shallot Sauce',sub:'plus Crispy Fingerlings & Broccoli Salad',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/beef-tenderloin-with-tangy-shallot-sauce-f1b8d9ae.jpg',time:'45 min',difficulty:'Medium',servings:'2',calories:'780 kcal',
    ingredientGroups:[
      {label:'Produce',items:[{amt:'12 oz',name:'Fingerling Potatoes'},{amt:'8 oz',name:'Broccoli Florets'},{amt:'1',name:'Shallot'},{amt:'2 oz',name:'Mixed Greens'}]},
      {label:'Proteins & Sauce',items:[{amt:'10 oz',name:'Beef Tenderloin Filets'},{amt:'5 tsp',name:'Red Wine Vinegar'},{amt:'2 tsp',name:'Dijon Mustard'},{amt:'2',name:'Chicken Stock Concentrate'},{amt:'2',name:'Plum Jam'}]},
      {label:'From Your Pantry',items:[{amt:'1 tbsp',name:'Cooking Oil'},{amt:'3 tbsp',name:'Olive Oil'},{amt:'1 tbsp',name:'Butter'},{amt:'to taste',name:'Salt & Pepper'}]}
    ],
    steps:[
      {title:'Start Potatoes & Prep',text:'Adjust rack to top position and preheat oven to 450°F. Halve potatoes lengthwise. Boil in salted water until tender, about 15 minutes. Drain and return to pot. Meanwhile, cut broccoli into bite-size pieces. Halve, peel, and thinly slice shallot; finely chop a few slices until you have 1½ tsp.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/636038ca138672a0d706bfe2/step-fb26ded8.jpg'},
      {title:'Roast Broccoli',text:'Toss broccoli on a baking sheet with a drizzle of oil, salt, and pepper. Roast on top rack until browned and tender, 12–15 minutes.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/636038ca138672a0d706bfe2/step-1d3598d7.jpg'},
      {title:'Cook Beef',text:'Pat beef dry and season generously with salt and pepper. Heat a drizzle of oil in a large pan over medium-high heat. Cook to desired doneness, 4–7 minutes per side. Transfer to a cutting board and tent with foil. Wipe out pan.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/636038ca138672a0d706bfe2/step-f1d5faba.jpg'},
      {title:'Make Pickles & Dressing',text:'In a small microwave-safe bowl, combine half the vinegar, 1 tsp sugar, ½ tsp water, salt, and pepper. Stir in sliced shallot, cover, and microwave 1 minute. Transfer 1 TBSP pickling liquid to a separate bowl; whisk in mustard and 2 TBSP olive oil for the dressing.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/636038ca138672a0d706bfe2/step-c1e7c43f.jpg'},
      {title:'Crisp Potatoes',text:'Add 1 TBSP olive oil to pot with drained potatoes. Cook over medium-high heat, stirring, until skins are crisp and browned, 3–5 minutes. Season with salt and pepper.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/636038ca138672a0d706bfe2/step-b4408b26.jpg'},
      {title:'Make Shallot Sauce',text:'Heat a drizzle of oil in the pan used for beef over medium heat. Add chopped shallot and cook 1–2 minutes. Stir in jam, stock concentrates, remaining vinegar, and ¼ cup water. Simmer until slightly thickened, 2–3 minutes. Remove from heat and stir in 1 TBSP butter until melted. Season to taste.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/636038ca138672a0d706bfe2/step-fdd44879.jpg'},
      {title:'Finish & Serve',text:'Toss mixed greens with broccoli, pickled shallot (drained), and dressing. Thinly slice beef against the grain. Divide beef, potatoes, and salad between plates. Spoon sauce over beef.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/636038ca138672a0d706bfe2/step-8a8f4d92.jpg'},
    ]},
  {id:'tagliata',tag:'HelloFresh',category:'Beef',title:'Sliced Steak Tagliata',sub:'with Sweet Potatoes, Green Beans & Tomato Vinaigrette',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/sliced-steak-tagliata-cbc9ad8c.jpg',time:'30 min',difficulty:'Easy',servings:'2',calories:'670 kcal',

      {title:'Prep',text:'Wash and dry all produce. Preheat oven to 450°F. Halve tomatoes lengthwise. Cut sweet potato into wedges. Strip and roughly chop rosemary leaves until you have 1 tsp. Smash garlic with the back of a knife.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a296a0cc9fd08438c4591e2/step-396be764.jpg'},
      {title:'Roast Sweet Potatoes',text:'Toss sweet potato on a baking sheet with garlic, chopped rosemary, a drizzle of olive oil, salt and pepper. Roast until lightly browned and tender, about 20 minutes, flipping halfway through.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a296a0cc9fd08438c4591e2/step-6e6092ac.jpg'},
      {title:'Make Vinaigrette',text:'In a small bowl, whisk together balsamic vinegar, 2 TBSP olive oil, and ½ tsp oregano. Season with salt and pepper. Set aside.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a296a0cc9fd08438c4591e2/step-59b77c23.jpg'},
      {title:'Cook Steak',text:'Heat a drizzle of olive oil in a large pan over medium-high heat. Season steak all over with salt and pepper. Cook until browned, 2–3 minutes per side. Transfer to a baking sheet, then roast until desired doneness, 5–7 minutes. Let rest 5 minutes.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a296a0cc9fd08438c4591e2/step-35bd9a4a.jpg'},
      {title:'Warm Vinaigrette',text:'While steak roasts, add vinaigrette and tomatoes to the same pan used for steak. Allow to warm through using residual heat from the pan.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a296a0cc9fd08438c4591e2/step-03f0313a.jpg'},
      {title:'Finish & Serve',text:'Slice steak thinly against the grain. Divide arugula between plates and lay steak on top. Drizzle with warm tomatoes and vinaigrette. Serve with sweet potato wedges on the side.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/5a296a0cc9fd08438c4591e2/step-c0cc8784.jpg'},

  {id:'pineapple-pork',tag:'HelloFresh',category:'Pork',title:'Pineapple Pork Chops',sub:'with Snap Peas and Jasmine Rice',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/w19-r3-61a087f1.jpg',time:'35 min',difficulty:'Easy',servings:'2',calories:'580 kcal',
    ingredientGroups:[
      {label:'Produce & Grains',items:[{amt:'1 cup',name:'Pineapple, chopped'},{amt:'6 oz',name:'Sugar Snap Peas'},{amt:'1',name:'Shallot'},{amt:'½ cup',name:'Jasmine Rice'},{amt:'1',name:'Lime'},{amt:'¼ oz',name:'Cilantro'}]},
      {label:'Protein & Sauce',items:[{amt:'12 oz',name:'Boneless Pork Chops'},{amt:'2 tsp',name:'Honey'}]},

    steps:[
      {title:'Prep',text:'Wash and dry all produce. Bring ¾ cup water and a large pinch of salt to a boil in a small pot. Trim tough ends from snap peas. Peel, halve, and mince shallot. Cut lime in half. Finely chop cilantro. Drain pineapple, reserving juice, and finely chop flesh.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58d3c6c83bddb5181238afd3-0-0-364362fd.jpg'},
      {title:'Cook Rice',text:'Once water is boiling, add rice. Cover, lower heat, and simmer until tender, 15–20 minutes. Remove from heat and keep covered until ready.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58d3c6c83bddb5181238afd3-1-0-94a5a9f2.jpg'},
      {title:'Make Salsa',text:'In a medium bowl, combine pineapple, 2 tsp shallot, half the cilantro, and juice from one lime half. Season with salt and pepper.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58d3c6c83bddb5181238afd3-2-0-532b713b.jpg'},
      {title:'Cook Pork',text:'Heat a drizzle of olive oil in a large pan over medium-high heat. Season pork with salt and pepper. Cook until nearly done, 4–5 minutes per side. Stir in remaining shallot, honey, reserved pineapple juice, and 2 TBSP water. Cook another 1–2 minutes. Remove from heat and squeeze in a little lime.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58d3c6c83bddb5181238afd3-3-0-d921d9bb.jpg'},
      {title:'Cook Snap Peas',text:'Transfer pork and glaze to a plate; cover with foil. Wipe out pan and heat a drizzle of olive oil over medium-high heat. Add snap peas and cook, tossing, until tender but still slightly crisp, 3–5 minutes. Season with salt and pepper.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58d3c6c83bddb5181238afd3-4-0-a6269f69.jpg'},
      {title:'Finish & Plate',text:'Stir remaining cilantro and a squeeze of lime into rice. Divide between plates, then top with snap peas, pork, glaze, and pineapple salsa.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/step/58d3c6c83bddb5181238afd3-5-0-4a5ec0c2.jpg'},
    ]},
  {id:'bourbon-pork',tag:'HelloFresh',category:'Pork',title:'Brown Sugar Bourbon Pork Chops',sub:'with Apple Pan Sauce, Scallion Mashed Potatoes & Broccoli',image:'https://media.hellofresh.com/q_100,w_3840,f_auto,c_limit,fl_lossy/recipes/image/652e8f7b0adad327d2408cca-ef3881e7.jpeg',time:'35 min',difficulty:'Medium',servings:'2',calories:'630 kcal',
    ingredientGroups:[
      {label:'Produce',items:[{amt:'12 oz',name:'Potatoes'},{amt:'12 oz',name:'Broccoli'},{amt:'1',name:'Apple'},{amt:'2',name:'Scallions'}]},
      {label:'Protein & Sauce',items:[{amt:'10 oz',name:'Pork Chops'},{amt:'10.8 g',name:'Brown Sugar Bourbon Seasoning'},{amt:'1',name:'Chicken Stock Concentrate'},{amt:'1.5 tbsp',name:'Sour Cream'}]},
      {label:'From Your Pantry',items:[{amt:'2 tbsp',name:'Butter'},{amt:'1 tsp',name:'Cooking Oil'},{amt:'to taste',name:'Salt & Pepper'}]}
    ],
    steps:[
      {title:'Cook Potatoes',text:'Adjust rack to middle position and preheat oven to 425°F. Dice potatoes into ½-inch pieces. Boil in salted water until tender, 15–20 minutes. Reserve ½ cup potato cooking liquid, then drain and return to pot. Keep covered off heat until ready to mash.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/6434eb74d77e4cc6860bf922/step-664ce4ea.jpg'},
      {title:'Cook Pork',text:'Pat pork dry and season all over with Brown Sugar Bourbon Seasoning. Heat a drizzle of oil in a large pan over medium-high heat. Cook until browned and cooked through, 4–6 minutes per side. Reduce to medium if browning too quickly. Transfer pork to a plate. Wipe out pan.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/6434eb74d77e4cc6860bf922/step-f0f48b89.jpg'},
      {title:'Roast Broccoli & Prep',text:'Cut broccoli into bite-size pieces. Toss with a drizzle of olive oil, salt, and pepper on a baking sheet. Roast until lightly browned, 15–20 minutes. Meanwhile, dice apple into ¼-inch pieces. Trim and thinly slice scallions, separating whites from greens.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/recipe/step-652e8f7b0adad327d2408cca-fab749d6.jpeg'},
      {title:'Make Apple Pan Sauce',text:'Melt 1 TBSP butter in pan used for pork over medium-high heat. Add apple and scallion whites; season with salt and pepper. Cook until golden, 4–6 minutes. Stir in stock concentrate, ½ cup water, and ½ tsp sugar. Cook until sauce thickens and apple is tender, 5–7 minutes. In the last 2 minutes, return pork to pan to warm through.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/6434eb74d77e4cc6860bf922/step-1228e3e5.jpg'},
      {title:'Mash Potatoes',text:'Mash potatoes until mostly smooth. Stir in scallion greens, sour cream, 1 TBSP butter, and a splash of reserved potato cooking liquid. Season with salt and pepper. Add more cooking liquid a splash at a time if needed for creaminess.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/recipe/step-659f05aa145e14b9dce0a0b4-189f1a4e.png'},
      {title:'Serve',text:'Divide pork, mashed potatoes, and broccoli between plates. Top pork with apple pan sauce and serve.',img:'https://media.hellofresh.com/w_750,q_auto,f_auto,c_limit,fl_lossy/hellofresh_s3/recipe/step-652e8f7b0adad327d2408cca-0e58d483.jpeg'},

let current = null, cookStep = 0, activeFilter = 'All';
const CATS = ['All','Beef','Chicken','Pork','Seafood','Turkey','Vegetarian','Pasta','Sides'];

function buildHome() {
  const fb = document.getElementById('filter-bar');
  fb.innerHTML = CATS.map(c => `<button class="filter-pill${c==='All'?' active':''}" onclick="setFilter('${c}',this)">${c}</button>`).join('');
  renderGrid();
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const filtered = activeFilter === 'All' ? RECIPES : RECIPES.filter(r => r.category === activeFilter);
  document.getElementById('recipe-count-label').textContent = `${RECIPES.length} recipes`;
  const grid = document.getElementById('recipe-grid');
  grid.innerHTML = '';
  filtered.forEach((r, i) => {
    const isWide = i === 0 && activeFilter === 'All';
    const card = document.createElement('div');
    card.className = 'recipe-card' + (isWide ? ' wide' : '');
    card.onclick = () => openDetail(r.id);
    const pills = [r.time ? `⏱ ${r.time}` : null, r.calories && r.calories !== '—' ? `🔥 ${r.calories}` : null].filter(Boolean);
    const catEmoji = {Beef:'🥩',Chicken:'🍗',Pork:'🐷',Seafood:'🦐',Turkey:'🦃',Vegetarian:'🥗',Pasta:'🍝',Sides:'🥣'}[r.category]||'🍴';
    card.className += ` cat-${r.category}`;
    card.innerHTML = `<img class="card-img" src="${r.image}" alt="${r.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="img-placeholder" style="display:none">${catEmoji}</div><div class="card-body"><div class="card-tag">${r.tag} · ${r.category}</div><div class="card-title">${r.title}</div><div class="card-sub">${r.sub}</div><div class="card-pills">${pills.map(p=>`<span class="card-pill">${p}</span>`).join('')}</div></div>`;
    grid.appendChild(card);
  });
}

function openDetail(id) {
  current = RECIPES.find(r => r.id === id);
  if (!current) return;
  const r = current;
  document.getElementById('d-img').src = r.image;
  document.getElementById('d-src').textContent = `${r.tag} · ${r.category}`;
  document.getElementById('d-title').textContent = r.title;
  document.getElementById('d-sub').textContent = r.sub;
  document.getElementById('d-meta').innerHTML = [{v:r.time||'—',l:'Time'},{v:r.difficulty||'—',l:'Level'},{v:r.servings||'—',l:'Serves'},{v:r.calories||'—',l:'Calories'}].map(m=>`<div class="meta-cell"><span class="meta-val">${m.v}</span><span class="meta-lbl">${m.l}</span></div>`).join('');
  const ingEl = document.getElementById('tab-ingredients');
  ingEl.innerHTML = '';
  (r.ingredientGroups||[]).forEach(g => {
    if (g.label) ingEl.innerHTML += `<div class="ing-group-label">${g.label}</div>`;
    g.items.forEach(it => ingEl.innerHTML += `<div class="ing-row"><span class="ing-dot"></span><span class="ing-amt">${it.amt}</span><span class="ing-name">${it.name}</span></div>`);
  });
  const stepsEl = document.getElementById('tab-steps');
  stepsEl.innerHTML = (!r.steps||!r.steps.length)
    ? `<div class="no-steps">🍴 Cooking steps coming soon — we'll add these as we build out the cookbook!</div>`
    : r.steps.map((s,i)=>`<div class="step-row"><div class="step-num">${i+1}</div><div><div class="step-label">${s.title}</div><div class="step-text">${s.text}</div>${s.img?`<img class="step-img" src="${s.img}" alt="${s.title}" loading="lazy">`:''}  </div></div>`).join('');
  switchTab('ingredients', document.querySelector('.tab-btn'));
  show('detail');
  document.querySelector('#detail .detail-body').scrollTop = 0;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const btns = document.querySelectorAll('.tab-btn');
  (name === 'ingredients' ? btns[0] : btns[1]).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function goHome() { show('home'); }

function startCooking() {
  if (!current?.steps?.length) { alert("No cooking steps yet for this recipe — coming soon!"); return; }
  cookStep = 0;
  document.getElementById('ck-prev').style.display = '';
  document.getElementById('ck-next').style.display = '';
  show('cooking');
  renderCookStep();
}

function exitCooking() { show('detail'); }

function renderCookStep() {
  const steps = current.steps, s = steps[cookStep], total = steps.length;
  document.getElementById('ck-counter').textContent = `Step ${cookStep+1} of ${total}`;
  document.getElementById('ck-fill').style.width = `${((cookStep+1)/total)*100}%`;
  document.getElementById('ck-prev').disabled = cookStep === 0;
  document.getElementById('ck-next').textContent = cookStep === total-1 ? '✓ Done' : 'Next →';
  document.getElementById('ck-content').innerHTML = `<div class="cook-big-num">${String(cookStep+1).padStart(2,'0')}</div><div class="cook-label">${s.title}</div><div class="cook-text">${s.text}</div>${s.img?`<img class="cook-step-img" src="${s.img}" alt="${s.title}">`:''}`;
  document.getElementById('ck-content').scrollTop = 0;
}

function cookNav(dir) {
  const steps = current.steps;
  if (dir === 1 && cookStep === steps.length-1) {
    document.getElementById('ck-content').innerHTML = `<div class="cook-done"><div class="done-emoji">🎉</div><div class="done-h">Bon Appétit!</div><div class="done-p">You just made<br><em>${current.title}</em></div><button class="done-back" onclick="exitCooking()">← Back to Recipe</button></div>`;
    document.getElementById('ck-fill').style.width = '100%';
    document.getElementById('ck-prev').style.display = 'none';
    document.getElementById('ck-next').style.display = 'none';
    return;
  }
  cookStep = Math.max(0, Math.min(steps.length-1, cookStep+dir));
  renderCookStep();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('hidden', s.id !== id));
}

buildHome();
</script>
</body>
</html>
